name: axd-car-booking

# Shared build definition so app, web and queue all build (not pull) the same image.
x-app-build: &app-build
  context: .
  dockerfile: docker/Dockerfile

services:
  # ---- PHP application (php-fpm) ----
  app:
    build: *app-build
    image: axd-car-booking:latest
    # Uses your existing repo-root .env. DB_HOST is forced to the bundled `db`
    # service — your .env's 127.0.0.1 would point the container at itself.
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: "3306"
    volumes:
      # Persist logs & uploaded files across rebuilds
      - storage-logs:/var/www/html/storage/logs
      - storage-app:/var/www/html/storage/app
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ---- Web server (nginx) — same image, serves public/ and proxies to app ----
  web:
    build: *app-build
    image: axd-car-booking:latest
    entrypoint: ["nginx", "-g", "daemon off;"]
    ports:
      # Bound to loopback by default — front it with a TLS reverse proxy in production.
      # Override the host port/interface via WEB_PORT / WEB_BIND in your env file.
      - "${WEB_BIND:-127.0.0.1}:${WEB_PORT:-8090}:80"
    depends_on:
      - app
    restart: unless-stopped

  # ---- Queue worker (database queue) ----
  queue:
    build: *app-build
    image: axd-car-booking:latest
    entrypoint: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600"]
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: "3306"
    volumes:
      - storage-logs:/var/www/html/storage/logs
      - storage-app:/var/www/html/storage/app
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_started
    restart: unless-stopped

  # ---- Database (MariaDB) ----
  db:
    image: mariadb:11
    environment:
      # Read from the repo-root .env so the DB creds always match the app.
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MARIADB_DATABASE: ${DB_DATABASE:-u2304932_car_booking}
      MARIADB_USER: ${DB_USERNAME:-u2304932_car_booking}
      MARIADB_PASSWORD: ${DB_PASSWORD:-nX7tT5rN0gdD2oQ6}
    volumes:
      - dbdata:/var/lib/mysql
      # Auto-imported ONLY on a fresh volume (first start)
      - ./u2304932_car_booking.sql:/docker-entrypoint-initdb.d/01-initial.sql:ro
    ports:
      # Loopback-only by default so the DB is never exposed publicly.
      - "${DB_BIND:-127.0.0.1}:${DB_PORT_HOST:-3307}:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  # ---- Public tunnel for the Telegram bot / Mini App (optional) ----
  # Start with:  NGROK_AUTHTOKEN=xxx docker compose --profile tunnel up -d
  ngrok:
    image: ngrok/ngrok:latest
    command: ["http", "web:80"]
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
    ports:
      - "4040:4040"   # ngrok inspector / local API
    depends_on:
      - web
    profiles:
      - tunnel
    restart: unless-stopped

volumes:
  dbdata:
  storage-logs:
  storage-app:
