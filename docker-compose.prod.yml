# ============================================================
# Production overrides for docker-compose.yml
#
# Secrets are injected from an untracked .env.production file (see
# .env.production.example) instead of the committed docker/env.docker defaults.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml \
#     --env-file .env.production up -d --build
#
# The ${VAR:?msg} entries are REQUIRED — compose refuses to start if unset,
# so you can't accidentally ship with placeholder secrets.
# ============================================================
name: axd-car-booking

services:
  app:
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: "${APP_URL:?set APP_URL in .env.production}"
      APP_KEY: "${APP_KEY:?set APP_KEY in .env.production - generate with artisan key generate --show}"
      WEBAPP_URL: "${WEBAPP_URL:?set WEBAPP_URL in .env.production}"
      DB_DATABASE: "${DB_DATABASE:-u2304932_car_booking}"
      DB_USERNAME: "${DB_USERNAME:-u2304932_car_booking}"
      DB_PASSWORD: "${DB_PASSWORD:?set DB_PASSWORD in .env.production}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"

  queue:
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: "${APP_URL:?set APP_URL in .env.production}"
      APP_KEY: "${APP_KEY:?set APP_KEY in .env.production}"
      WEBAPP_URL: "${WEBAPP_URL:?set WEBAPP_URL in .env.production}"
      DB_DATABASE: "${DB_DATABASE:-u2304932_car_booking}"
      DB_USERNAME: "${DB_USERNAME:-u2304932_car_booking}"
      DB_PASSWORD: "${DB_PASSWORD:?set DB_PASSWORD in .env.production}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"

  db:
    environment:
      MARIADB_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:?set DB_ROOT_PASSWORD in .env.production}"
      MARIADB_DATABASE: "${DB_DATABASE:-u2304932_car_booking}"
      MARIADB_USER: "${DB_USERNAME:-u2304932_car_booking}"
      MARIADB_PASSWORD: "${DB_PASSWORD:?set DB_PASSWORD in .env.production}"
